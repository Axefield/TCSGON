# Phase 6 CI — lint, typecheck, test + sharded coverage, build, bundle budget,
# edge-case validation, a11y (unit axe + E2E axe + keyboard), E2E (sharded),
# Lighthouse CI.
#
# Runs on every push to main and every PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

# ---------------------------------------------------------------------------
# Shared setup used by multiple jobs
# ---------------------------------------------------------------------------
defaults:
  run:
    shell: bash

# ---------------------------------------------------------------------------
# Quality gate — lint, typecheck, sharded unit tests + coverage
# ---------------------------------------------------------------------------
jobs:
  quality:
    name: Lint + TypeCheck + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Unit tests + coverage
        run: pnpm test:coverage

      - name: Validate edge case registry
        run: pnpm validate:edge-cases

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/

  # ---------------------------------------------------------------------------
  # Build + bundle budget + edge-case validation
  # ---------------------------------------------------------------------------
  build:
    name: Build + Bundle Check
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Build analysis
        run: pnpm build:analyze

      - name: Bundle budget check
        run: pnpm check:budgets

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dist
          path: dist/

  # ---------------------------------------------------------------------------
  # E2E — Chromium (sharded) + a11y (axe + keyboard)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Chromium)
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      # Playwright webServer config handles starting/stopping the preview server.
      # No manual start needed.

      - name: E2E tests (shard ${{ matrix.shard }}/4)
        # Only run the chromium project — other projects (axe-firefox, mobile) need
        # different browser binaries or are a11y-specific and run in the a11y job.
        run: pnpm exec playwright test --project=chromium --shard=${{ matrix.shard }}/4

      - name: Upload Playwright report (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/

  # ---------------------------------------------------------------------------
  # A11y — axe-core E2E on Chromium + Firefox
  # ---------------------------------------------------------------------------
  a11y:
    name: A11y (axe + keyboard)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-a11y-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Install Playwright system deps (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium firefox

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      # Playwright webServer config handles starting/stopping the preview server.
      # No manual start needed.

      - name: A11y audit (axe-core, Chromium)
        run: pnpm axe

      - name: A11y audit (axe-core, Firefox)
        run: pnpm axe:firefox

      - name: Keyboard-only walkthrough
        run: pnpm keyboard

      - name: Upload a11y reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: a11y-reports
          path: playwright-report/

  # ---------------------------------------------------------------------------
  # Lighthouse CI — CWV + a11y score + performance score
  # ---------------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Lighthouse CI
        run: pnpm lhci

      - name: Upload LHCI reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lhci-reports
          path: lhci-reports/
