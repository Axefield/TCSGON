version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '5242:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Axefield5242
      POSTGRES_DB: tcsgon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application server ──────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://postgres:Axefield5242@postgres:5432/tcsgon
      NODE_ENV: production
      PORT: '3001'
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
