# TCSgon — Codex CLI configuration

model = "gpt-4o"

[agents.architecture]
file = ".codex/agents/architecture-agent.toml"

[agents.react]
file = ".codex/agents/react-agent.toml"

[agents.typescript]
file = ".codex/agents/typescript-agent.toml"

[agents.testing]
file = ".codex/agents/testing-agent.toml"

[agents.performance]
file = ".codex/agents/performance-agent.toml"

[agents.accessibility]
file = ".codex/agents/accessibility-agent.toml"

[agents.code-review]
file = ".codex/agents/code-review-agent.toml"

[agents.documentation]
file = ".codex/agents/documentation-agent.toml"

[agents.ai-workflow]
file = ".codex/agents/ai-workflow-agent.toml"

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
env = { GITHUB_PERSONAL_ACCESS_TOKEN = "${env:GITHUB_TOKEN}" }

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "."]

[permissions]
allow = [
    { tool = "read" },
    { tool = "glob" },
    { tool = "grep" },
    { tool = "edit" },
    { tool = "write" },
    { tool = "bash", command = "pnpm *" },
    { tool = "bash", command = "npm *" },
    { tool = "bash", command = "git *" },
    { tool = "bash", command = "node *" },
    { tool = "bash", command = "vite *" },
    { tool = "bash", command = "tsc *" },
    { tool = "bash", command = "vitest *" },
    { tool = "bash", command = "playwright *" },
]
deny = [
    { tool = "bash", command = "rm -rf *" },
    { tool = "read", path = ".env" },
    { tool = "read", path = ".env.*" },
    { tool = "read", path = "secrets/**" },
]

[memory]
files = ["AGENTS.md", "SKILLS.md", ".codex/config.toml", ".codex/agents/*.toml"]